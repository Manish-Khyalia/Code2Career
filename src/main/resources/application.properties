# Update the database username and password before running the project.

spring.application.name=code2career

spring.datasource.url=jdbc:mysql://localhost:3306/code2career
spring.datasource.username=root
spring.datasource.password=your_password
# Add your OpenRouter API key before running the project
openrouter.api.key=YOUR_OPENROUTER_API_KEY

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
